<section class="form-card">
	<h2>Formulário 1 — Nome</h2>

	<form #f="ngForm" (ngSubmit)="onSubmit(f)" class="simple-form">
		<div class="form-group">
			<label for="nome" class="label-required">Nome</label>
			<input
				id="nome"
				name="nome"
				type="text"
				class="form-control"
				placeholder="Digite seu nome"
				required
				minlength="3"
				[(ngModel)]="nome"
				#nomeRef="ngModel"
			/>

			<div class="error" *ngIf="(nomeRef.touched || nomeRef.dirty) && nomeRef.invalid">
				<small *ngIf="nomeRef.errors?.['required']">O nome é obrigatório.</small>
				<small *ngIf="nomeRef.errors?.['minlength']">Mínimo 3 caracteres.</small>
			</div>
		</div>

		<div class="form-actions">
			<button type="submit" class="btn btn-primary" [disabled]="!f.valid">Enviar</button>
			<button type="button" class="btn btn-secondary" (click)="onReset(f)">Limpar</button>
		</div>

		<div class="summary" *ngIf="enviado && f.valid">
			<h3>Dados enviados</h3>
			<p><strong>Nome:</strong> {{ nome }}</p>
		</div>
	</form>
</section>
